<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Fashion Stylist</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="card">


<h1>
🤖 AI Fashion Stylist
</h1>


<p>
Upload your photo and let AI style you.
</p>



<input 
type="file"
id="personPhoto"
accept="image/*">



<input 
id="question"
placeholder="Example: Dress me for a luxury dinner">



<button onclick="askStylist()">
✨ Generate Outfit
</button>



<h2>
AI Advice
</h2>


<pre id="answer"></pre>




<h2>
Your AI Look
</h2>


<img 
id="generatedImage"
width="350">



</div>



<script type="module" src="ai-stylist.js"></script>


</body>

</html>
