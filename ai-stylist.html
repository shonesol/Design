<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>AI Fashion Stylist</title>


<link rel="stylesheet" href="style.css">


<meta name="theme-color" content="#1b1b1b">

</head>



<body>



<div class="card">



<h1>
🤖 AI Fashion Stylist
</h1>



<p>
Your AI stylist uses your personal wardrobe.
</p>





<!-- USER PHOTO -->

<h3>
Upload Your Photo (Optional)
</h3>


<input

type="file"

id="personPhoto"

accept="image/*"

>



<br><br>



<img

id="photoPreview"

width="250"

style="border-radius:15px;display:none;"

>





<!-- QUESTION -->

<h3>
What do you want to wear?
</h3>



<input

id="question"

placeholder="Example: Dress me for a luxury dinner"

>




<button onclick="askStylist()">

✨ Generate Outfit

</button>





<h2>
🤖 AI Fashion Advice
</h2>



<pre id="answer">

</pre>






<!-- FUTURE AI TRY ON RESULT -->

<h2>
🧍 Your AI Look
</h2>



<img

id="generatedImage"

width="350"

style="border-radius:15px;"

>





</div>






<script type="module" src="ai-stylist.js"></script>



<script>


// Photo preview

document
.getElementById("personPhoto")
.addEventListener(
"change",
function(){


const file =
this.files[0];


if(file){


const img =
document.getElementById("photoPreview");


img.src =
URL.createObjectURL(file);


img.style.display="block";


}



}

);



</script>



</body>

</html>
