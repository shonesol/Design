<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Fashion Profile</title>

<body>


<div class="card">

<h1>👤 My Fashion Profile</h1>

<button onclick="saveProfile()">
Save Preferences
</button>


<p id="message"></p>
