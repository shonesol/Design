<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI Wardrobe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🧺 My AI Wardrobe</h1>

    <p>Your clothes collection with AI clothing classification.</p>

    <div id="laundryList" class="clothes-grid">
        <p>Loading wardrobe...</p>
    </div>

</div>

<!-- Image Modal -->
<div id="imageModal" class="modal" style="display:none;">

    <span class="close-btn" onclick="closeImage()">&times;</span>

    <img id="previewImage" alt="Clothing Preview">

    <div id="details"></div>

</div>

<!-- Load Laundry JavaScript -->
<script type="module" src="./laundry.js"></script>

</body>
</html>
