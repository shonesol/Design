<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>AI Virtual Try-On</title>


<link rel="stylesheet" href="style.css">


<meta name="theme-color" content="#1b1b1b">

</head>


<body>


<div class="card">


<h1>
🧍 AI Virtual Try-On
</h1>


<p>
Upload your photo and choose clothes.
AI will create your fashion look.
</p>





<!-- USER PHOTO -->

<h3>
📸 Your Photo
</h3>


<input
type="file"
id="personImage"
accept="image/*">



<br><br>


<img
id="personPreview"
width="250"
style="border-radius:15px;">







<!-- CLOTHING -->

<h3>
👕 Select Clothing
</h3>



<input
type="file"
id="clothImage"
accept="image/*">



<br><br>


<img
id="clothPreview"
width="250"
style="border-radius:15px;">







<button onclick="generateTryOn()">

✨ Dress Me With AI

</button>






<h2>
🤖 AI Result
</h2>



<p id="loading">

</p>





<img
id="resultImage"
width="350"
style="border-radius:15px;">





</div>







<script type="module" src="tryon.js"></script>



</body>

</html>
