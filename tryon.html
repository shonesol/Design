<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Virtual Try-On</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="card">


<h1>🧍 AI Virtual Try-On</h1>


<p>
Upload your photo and select clothes.
AI will create your outfit preview.
</p>



<h3>Your Photo</h3>

<input 
type="file"
id="personImage"
accept="image/*">


<br><br>


<img 
id="personPreview"
width="250">





<h3>Select Clothes</h3>


<input 
type="file"
id="clothImage"
accept="image/*">


<br><br>


<img 
id="clothPreview"
width="250">





<br><br>


<button onclick="generateTryOn()">

✨ Dress Me With AI

</button>




<h2>
AI Result
</h2>


<div id="loading"></div>


<img 
id="resultImage"
width="350">



</div>




<script type="module" src="tryon.js"></script>


</body>

</html>
