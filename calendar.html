<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Outfit Planner</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#1b1b1b">
</head>


<body>


<div class="card">

<h1>📅 Outfit Planner AI</h1>


<input 
type="date"
id="date">



<select id="event">

<option value="casual">
Casual Day
</option>

<option value="office">
Office
</option>

<option value="wedding">
Wedding
</option>

<option value="travel">
Travel
</option>

<option value="party">
Party
</option>

</select>



<button onclick="planOutfit()">
Create Plan
</button>



<pre id="planResult"></pre>


<h2>My Schedule</h2>

<div id="schedule"></div>


</div>



<script type="module" src="calendar.js"></script>


</body>

</html>
