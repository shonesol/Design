<!DOCTYPE html>
<html>
<head>
  <title>Upload Clothes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Upload Your Clothes</h2>

  <input type="file" id="file">
  <button onclick="uploadClothes()">Upload</button>

  <p id="status"></p>
</div>
<hr>

<h2>AI Outfit Suggestion</h2>

<button onclick="getOutfitSuggestion()">Generate Outfit</button>

<pre id="outfit"></pre>
<hr>

<h2>💬 AI Fashion Stylist Chat</h2>

<input type="text" id="userMsg" placeholder="Ask what to wear...">
<button onclick="sendMessage()">Ask AI</button>

<pre id="chatReply"></pre>

<script type="module" src="ai-recommend.js"></script>
<script type="module" src="upload.js"></script>
</body>
</html>
