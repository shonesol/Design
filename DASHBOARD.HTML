<!DOCTYPE html>
<html>
<head>
  <title>Upload Clothes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Upload Your Clothes</h2>

  <input type="file" id="file">
  <button onclick="uploadClothes()">Upload</button>

  <p id="status"></p>
</div>
<hr>

<h2>AI Outfit Suggestion</h2>

<button onclick="getOutfitSuggestion()">Generate Outfit</button>

<pre id="outfit"></pre>
<hr>

<h2>💬 AI Fashion Stylist Chat</h2>

<input type="text" id="userMsg" placeholder="Ask what to wear...">
<button onclick="sendMessage()">Ask AI</button>

<pre id="chatReply"></pre>
<hr>

<h2>🌦 Weather Outfit AI</h2>

<button onclick="getWeatherOutfit()">Suggest Outfit Based on Weather</button>
<pre id="weatherResult"></pre>
<hr>

<h2>🧍 AI Pose Try-On (Advanced)</h2>

<video id="video" width="300" height="400" autoplay></video>
<canvas id="canvas" width="300" height="400"></canvas>

<br>

<p>Upload clothing image:</p>
<input type="file" id="clothPose">

<button onclick="startPoseTryOn()">Start AI Try-On</button>

<canvas id="canvas" width="300" height="400" style="border:1px solid black;"></canvas>


<script src="tryon-ai.js"></script>
<script type="module" src="weather-ai.js"></script>
<script type="module" src="chat-ai.js"></script>
<script type="module" src="ai-recommend.js"></script>
<script type="module" src="upload.js"></script>
</body>
</html>
