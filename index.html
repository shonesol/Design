<!DOCTYPE html>
<html>
<head>

<title>FashionAI Wardrobe</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>


<div class="container">


<div class="card">

<h1>🤖 Add Clothing With AI</h1>


<input 
type="file"
id="clothingImage"
accept="image/*"
>


<button id="uploadBtn">
✨ Upload & Analyze
</button>


<p id="message"></p>


</div>



<div class="card">

<h1>📊 Wardrobe Dashboard</h1>

<div id="stats">
Loading statistics...
</div>


</div>



<input 
class="search"
id="search"
placeholder="🔍 Search clothes"
>



<select id="category">

<option>
All Categories
</option>

<option>
Shirt
</option>

<option>
Dress
</option>

<option>
Trouser
</option>

<option>
Shoes
</option>

</select>




<h1>
👕 My Clothes Collection
</h1>


<div id="clothesList">

</div>



</div>


<script type="module" src="app.js"></script>

</body>
</html>
