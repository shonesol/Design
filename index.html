<!DOCTYPE html>
<html>
<head>

<title>FashionAI Wardrobe</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">


<!-- Upload Section -->
<div class="card">

<h1>🤖 Add Clothing With AI</h1>

<input 
type="file"
id="clothingImage"
accept="image/*"
>

<button id="uploadBtn">
✨ Upload & Analyze
</button>

<p id="message"></p>

</div>



<!-- Dashboard -->
<div class="card">

<h1>📊 Wardrobe Dashboard</h1>

<div id="stats">
Loading statistics...
</div>

<div class="dashboard">

<div class="stat-card">
<h3>Total Clothes</h3>
<p id="totalClothes">0</p>
</div>


<div class="stat-card">
<h3>Favourite Style</h3>
<p id="favoriteStyle">Learning</p>
</div>


<div class="stat-card">
<h3>AI Confidence</h3>
<p id="confidence">0%</p>
</div>

</div>

</div>



<!-- Search -->
<input 
class="search"
id="search"
placeholder="🔍 Search clothes"
>



<!-- Category Filter -->
<select id="category">

<option value="all">
All Categories
</option>

<option value="Shirt">
Shirt
</option>

<option value="Dress">
Dress
</option>

<option value="Trouser">
Trouser
</option>

<option value="Shoes">
Shoes
</option>

</select>



<!-- Collection -->
<div class="card">

<h1>
👕 My Clothes Collection
</h1>


<div id="clothesList">

Loading clothes...

</div>


</div>


</div>


<script type="module" src="app.js"></script>


</body>
</html>
