<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>AI Outfit Generator</title>


<link rel="stylesheet" href="style.css">


<meta name="theme-color" content="#1b1b1b">

</head>



<body>



<div class="card">



<h1>
👗 AI Outfit Generator
</h1>



<p>
Generate outfits using clothes saved in your personal wardrobe.
</p>




<label>
Choose Occasion
</label>



<select id="occasion">


<option value="casual">
🌤 Casual
</option>


<option value="office">
💼 Office
</option>


<option value="wedding">
💍 Wedding
</option>


<option value="party">
🎉 Party
</option>


<option value="travel">
✈️ Travel
</option>


<option value="date">
❤️ Date Night
</option>


</select>





<button id="generateBtn">

✨ Generate Outfit

</button>





<h2>
🤖 AI Outfit Recommendation
</h2>




<pre id="outfitResult">

Your outfit will appear here...

</pre>





<h2>
🧍 Your AI Look
</h2>



<img

id="outfitImage"

width="350"

style="border-radius:15px;"

>





</div>







<script type="module" src="outfit-generator.js"></script>




</body>

</html>
